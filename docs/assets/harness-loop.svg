<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Codex Harness MCP feature map</title>
  <desc id="desc">A detailed map of the Codex Harness MCP loop for MCP coding clients: contracts, local knowledge, traces, verification records, observability reports, evals, harness proposals, promotion decisions, natural-language spec export, MCP resources, prompts, and local safety boundaries.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="45%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#f7fee7"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="42%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="store" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ecfccb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#334155" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 1 L11 6 L2 11 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 1 L11 6 L2 11 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 1 L11 6 L2 11 Z" fill="#d97706"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 1 L11 6 L2 11 Z" fill="#e11d48"/>
    </marker>
    <style>
      .font { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .title { font-size: 54px; font-weight: 850; fill: #ffffff; letter-spacing: 0; }
      .subtitle { font-size: 22px; font-weight: 500; fill: #dbeafe; letter-spacing: 0; }
      .eyebrow { font-size: 13px; font-weight: 850; letter-spacing: 1.2px; text-transform: uppercase; }
      .section { font-size: 22px; font-weight: 850; fill: #0f172a; letter-spacing: 0; }
      .card-title { font-size: 19px; font-weight: 850; fill: #0f172a; letter-spacing: 0; }
      .small { font-size: 14px; font-weight: 500; fill: #475569; letter-spacing: 0; }
      .tiny { font-size: 12px; font-weight: 650; fill: #475569; letter-spacing: 0; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 13px; fill: #334155; }
      .pill-text { font-size: 12px; font-weight: 800; letter-spacing: 0; }
      .line-blue { stroke: #2563eb; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-blue); }
      .line-green { stroke: #059669; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-green); }
      .line-amber { stroke: #d97706; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-amber); }
      .line-rose { stroke: #e11d48; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-rose); }
      .dash { stroke-dasharray: 8 9; }
    </style>
  </defs>

  <rect width="1600" height="1000" rx="34" fill="url(#page)"/>
  <rect x="36" y="36" width="1528" height="174" rx="28" fill="url(#header)" filter="url(#shadow)"/>
  <g class="font">
    <text x="76" y="103" class="eyebrow" fill="#bfdbfe">Local MCP server for MCP coding clients</text>
    <text x="76" y="160" class="title">Codex Harness MCP</text>
    <text x="76" y="194" class="subtitle">Codex, Claude Code, OpenCode, Kilo, Gemini, Cursor, VS Code, Cline, Windsurf: same local harness.</text>
  </g>

  <g transform="translate(1132 70)" class="font">
    <rect x="0" y="0" width="386" height="108" rx="22" fill="#ffffff" opacity="0.96"/>
    <text x="24" y="35" class="card-title">Safety posture</text>
    <text x="24" y="62" class="small">No runtime downloads. No shell execution.</text>
    <text x="24" y="85" class="small">No remote calls. No credentials.</text>
    <circle cx="334" cy="54" r="28" fill="#dcfce7"/>
    <path d="M321 54 l9 9 l19 -23" stroke="#15803d" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g class="font" filter="url(#soft)">
    <rect x="54" y="246" width="214" height="126" rx="22" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <text x="82" y="286" class="eyebrow" fill="#2563eb">Input</text>
    <text x="82" y="318" class="card-title">User request</text>
    <text x="82" y="346" class="small">Goal, constraints, files,</text>
    <text x="82" y="367" class="small">and desired outcome.</text>

    <rect x="316" y="246" width="214" height="126" rx="22" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <text x="344" y="286" class="eyebrow" fill="#059669">Memory first</text>
    <text x="344" y="318" class="card-title">Query local RAG</text>
    <text x="344" y="346" class="small">Research, lessons,</text>
    <text x="344" y="367" class="small">sources, project notes.</text>

    <rect x="578" y="246" width="214" height="126" rx="22" fill="#ffffff" stroke="#fde68a" stroke-width="2"/>
    <text x="606" y="286" class="eyebrow" fill="#d97706">Contract</text>
    <text x="606" y="318" class="card-title">Bound the work</text>
    <text x="606" y="346" class="small">Goal, budgets, outputs,</text>
    <text x="606" y="367" class="small">permissions, done rules.</text>

    <rect x="840" y="246" width="214" height="126" rx="22" fill="#ffffff" stroke="#fecdd3" stroke-width="2"/>
    <text x="868" y="286" class="eyebrow" fill="#e11d48">Execution</text>
    <text x="868" y="318" class="card-title">Work and trace</text>
    <text x="868" y="346" class="small">Attempts, failures,</text>
    <text x="868" y="367" class="small">decisions, raw evidence.</text>

    <rect x="1102" y="246" width="214" height="126" rx="22" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
    <text x="1130" y="286" class="eyebrow" fill="#7c3aed">Verification</text>
    <text x="1130" y="318" class="card-title">Record proof</text>
    <text x="1130" y="346" class="small">Command output or</text>
    <text x="1130" y="367" class="small">manual check results.</text>

    <rect x="1364" y="246" width="178" height="126" rx="22" fill="#ffffff" stroke="#99f6e4" stroke-width="2"/>
    <text x="1392" y="286" class="eyebrow" fill="#0f766e">Gate</text>
    <text x="1392" y="318" class="card-title">Close or loop</text>
    <text x="1392" y="346" class="small">Pass, fail, unknown,</text>
    <text x="1392" y="367" class="small">or keep working.</text>
  </g>

  <path class="line-blue" d="M268 309 H306"/>
  <path class="line-green" d="M530 309 H568"/>
  <path class="line-amber" d="M792 309 H830"/>
  <path class="line-rose" d="M1054 309 H1092"/>
  <path class="line-blue" d="M1316 309 H1354"/>
  <path class="line-amber dash" d="M1453 382 C1453 443 969 448 958 385"/>

  <g class="font" filter="url(#soft)">
    <rect x="54" y="426" width="458" height="476" rx="26" fill="url(#store)" stroke="#fed7aa" stroke-width="2"/>
    <text x="86" y="470" class="section">Project-local system of record</text>
    <text x="86" y="499" class="small">Everything is written under one inspectable workspace.</text>
    <rect x="86" y="528" width="390" height="306" rx="18" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
    <text x="112" y="564" class="mono">.codex-harness/</text>
    <text x="132" y="596" class="mono">state.json</text>
    <text x="132" y="624" class="mono">HARNESS.md</text>
    <text x="132" y="652" class="mono">contracts/</text>
    <text x="132" y="680" class="mono">traces/</text>
    <text x="132" y="708" class="mono">gates/</text>
    <text x="132" y="736" class="mono">knowledge/</text>
    <text x="132" y="764" class="mono">evals/</text>
    <text x="132" y="792" class="mono">harness-profiles/</text>
    <text x="132" y="820" class="mono">harness-proposals/</text>
    <text x="304" y="596" class="mono">promotion-decisions/</text>
    <text x="304" y="624" class="mono">migrations/</text>
    <text x="304" y="652" class="mono">artifacts/</text>
    <text x="304" y="680" class="mono">scratch/</text>

    <g transform="translate(86 856)">
      <rect width="118" height="30" rx="15" fill="#ffedd5"/>
      <text x="18" y="20" class="pill-text" fill="#9a3412">Local only</text>
      <rect x="132" width="128" height="30" rx="15" fill="#dcfce7"/>
      <text x="150" y="20" class="pill-text" fill="#166534">Inspectable</text>
      <rect x="274" width="116" height="30" rx="15" fill="#dbeafe"/>
      <text x="294" y="20" class="pill-text" fill="#1d4ed8">Durable</text>
    </g>
  </g>

  <g class="font" filter="url(#soft)">
    <rect x="554" y="426" width="472" height="214" rx="26" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <text x="586" y="470" class="section">Persistent knowledge loop</text>
    <text x="586" y="499" class="small">Research and implementation lessons become reusable local context.</text>
    <g transform="translate(586 524)">
      <rect width="180" height="82" rx="16" fill="#ecfdf5"/>
      <text x="20" y="32" class="card-title">Research</text>
      <text x="20" y="58" class="small">Sources and findings</text>
      <rect x="214" width="180" height="82" rx="16" fill="#f0fdf4"/>
      <text x="234" y="32" class="card-title">Lessons</text>
      <text x="234" y="58" class="small">Fixes and patterns</text>
    </g>
    <path class="line-green" d="M682 611 C682 684 898 684 898 613"/>
    <text x="653" y="623" class="tiny">harness_query_knowledge</text>
  </g>

  <g class="font" filter="url(#soft)">
    <rect x="1070" y="426" width="472" height="214" rx="26" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
    <text x="1102" y="470" class="section">MCP surface for agents</text>
    <text x="1102" y="499" class="small">Clients can read state, prompts, the spec, and observability report.</text>
    <g transform="translate(1102 526)">
      <rect width="124" height="74" rx="16" fill="#eef2ff"/>
      <text x="20" y="31" class="card-title">Tools</text>
      <text x="20" y="55" class="small">27 actions</text>
      <rect x="146" width="124" height="74" rx="16" fill="#f5f3ff"/>
      <text x="166" y="31" class="card-title">Resources</text>
      <text x="166" y="55" class="small">report + spec</text>
      <rect x="292" width="124" height="74" rx="16" fill="#ecfeff"/>
      <text x="312" y="31" class="card-title">Prompts</text>
      <text x="312" y="55" class="small">17 recipes</text>
    </g>
  </g>

  <g class="font" filter="url(#soft)">
    <rect x="554" y="684" width="472" height="218" rx="26" fill="#ffffff" stroke="#fde68a" stroke-width="2"/>
    <text x="586" y="728" class="section">Harness evals and profiles</text>
    <text x="586" y="757" class="small">Measure the harness instead of assuming more structure helps.</text>
    <g transform="translate(586 784)">
      <rect width="126" height="72" rx="16" fill="#fef3c7"/>
      <text x="18" y="30" class="card-title">Profiles</text>
      <text x="18" y="53" class="small">minimal, standard</text>
      <rect x="148" width="126" height="72" rx="16" fill="#fffbeb"/>
      <text x="166" y="30" class="card-title">Eval cases</text>
      <text x="166" y="53" class="small">optimization</text>
      <rect x="296" width="126" height="72" rx="16" fill="#fefce8"/>
      <text x="314" y="30" class="card-title">Eval runs</text>
      <text x="314" y="53" class="small">score, cost, time</text>
    </g>
    <text x="586" y="878" class="tiny">Compare baseline versus candidate before changing the operating loop.</text>
  </g>

  <g class="font" filter="url(#soft)">
    <rect x="1070" y="684" width="472" height="218" rx="26" fill="#ffffff" stroke="#fecdd3" stroke-width="2"/>
    <text x="1102" y="728" class="section">Meta-Harness-lite promotion</text>
    <text x="1102" y="757" class="small">Promote harness changes only when evidence supports it.</text>
    <g transform="translate(1102 784)">
      <rect width="190" height="72" rx="16" fill="#fff1f2"/>
      <text x="18" y="30" class="card-title">Proposal</text>
      <text x="18" y="53" class="small">hypothesis and gain</text>
      <rect x="214" width="190" height="72" rx="16" fill="#ffe4e6"/>
      <text x="232" y="30" class="card-title">Decision</text>
      <text x="232" y="53" class="small">promote, reject, hold</text>
    </g>
    <text x="1102" y="878" class="tiny">Requires optimization, holdout, regressions, accepted risks, and follow-up.</text>
  </g>

  <g class="font" filter="url(#soft)">
    <rect x="54" y="922" width="1488" height="48" rx="18" fill="#0f172a"/>
    <text x="86" y="953" font-size="16" font-weight="800" fill="#bfdbfe">Boundary rule:</text>
    <text x="210" y="953" font-size="16" font-weight="600" fill="#e2e8f0">Stored user/source text returns inside</text>
    <text x="487" y="953" class="mono" fill="#a7f3d0">&lt;untrusted-data&gt;</text>
    <text x="655" y="953" font-size="16" font-weight="600" fill="#e2e8f0">blocks and must be treated as evidence, never instructions.</text>
    <text x="1164" y="953" font-size="16" font-weight="800" fill="#fde68a">Completion requires a gate.</text>
  </g>

  <path class="line-green dash" d="M423 382 C423 412 283 412 283 426"/>
  <path class="line-green dash" d="M790 640 V676"/>
  <path class="line-blue dash" d="M1209 382 C1209 412 1306 402 1306 426"/>
  <path class="line-amber dash" d="M685 382 C685 412 790 396 790 426"/>
  <path class="line-rose dash" d="M1453 382 C1453 648 1306 651 1306 684"/>

  <g class="font">
    <text x="72" y="232" class="eyebrow" fill="#334155">Main agent loop</text>
    <text x="554" y="408" class="eyebrow" fill="#334155">Reusable knowledge and MCP context</text>
    <text x="554" y="666" class="eyebrow" fill="#334155">Harness engineering evidence</text>
  </g>
</svg>
