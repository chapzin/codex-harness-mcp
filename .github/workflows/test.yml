name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.x", "22.x"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Run test suite
        run: |
          failures=0
          for t in tests/*.mjs; do
            if node "$t" > /tmp/test-out.log 2>&1; then
              echo "PASS: $t"
            else
              echo "FAIL: $t"
              cat /tmp/test-out.log
              failures=$((failures + 1))
            fi
          done
          if [ "$failures" -gt 0 ]; then
            echo "$failures test file(s) failed"
            exit 1
          fi
          echo "All tests passed."

      - name: No-runtime-deps invariant
        run: node tests/no-runtime-deps.mjs

      - name: Release quality gates
        run: node tests/release-quality-gates.mjs
