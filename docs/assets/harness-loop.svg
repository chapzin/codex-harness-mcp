<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Codex Harness MCP loop</title>
  <desc id="desc">A local harness loop from request to knowledge, contract, trace, verification, gate, and handoff.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="52%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1280" height="520" rx="34" fill="url(#bg)"/>
  <text x="72" y="86" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="800">Codex Harness MCP</text>
  <text x="74" y="126" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Contracts, local knowledge, traces, and gates for long-running Codex work</text>

  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(72 190)">
      <rect width="170" height="112" rx="18" fill="#eff6ff"/>
      <text x="24" y="43" fill="#1e3a8a" font-size="20" font-weight="800">Request</text>
      <text x="24" y="76" fill="#334155" font-size="15">User goal</text>
    </g>
    <g transform="translate(284 190)">
      <rect width="170" height="112" rx="18" fill="#ecfdf5"/>
      <text x="24" y="43" fill="#065f46" font-size="20" font-weight="800">Knowledge</text>
      <text x="24" y="76" fill="#334155" font-size="15">Local RAG</text>
    </g>
    <g transform="translate(496 190)">
      <rect width="170" height="112" rx="18" fill="#fefce8"/>
      <text x="24" y="43" fill="#854d0e" font-size="20" font-weight="800">Contract</text>
      <text x="24" y="76" fill="#334155" font-size="15">Bounds and gates</text>
    </g>
    <g transform="translate(708 190)">
      <rect width="170" height="112" rx="18" fill="#fff1f2"/>
      <text x="24" y="43" fill="#9f1239" font-size="20" font-weight="800">Trace</text>
      <text x="24" y="76" fill="#334155" font-size="15">Raw evidence</text>
    </g>
    <g transform="translate(920 190)">
      <rect width="170" height="112" rx="18" fill="#f5f3ff"/>
      <text x="24" y="43" fill="#5b21b6" font-size="20" font-weight="800">Verify</text>
      <text x="24" y="76" fill="#334155" font-size="15">Proof records</text>
    </g>
    <g transform="translate(522 350)">
      <rect width="236" height="94" rx="18" fill="#f8fafc"/>
      <text x="28" y="38" fill="#0f172a" font-size="20" font-weight="800">Completion Gate</text>
      <text x="28" y="67" fill="#334155" font-size="15">Pass, fail, or keep working</text>
    </g>
  </g>

  <g stroke="#93c5fd" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95">
    <path d="M246 246H278"/>
    <path d="M458 246H490"/>
    <path d="M670 246H702"/>
    <path d="M882 246H914"/>
    <path d="M1005 306C1005 390 824 397 766 397"/>
    <path d="M514 397C392 390 360 324 369 306"/>
  </g>
  <g fill="#93c5fd">
    <path d="M278 246l-12-8v16z"/>
    <path d="M490 246l-12-8v16z"/>
    <path d="M702 246l-12-8v16z"/>
    <path d="M914 246l-12-8v16z"/>
    <path d="M766 397l14-8v16z"/>
    <path d="M369 306l8 13-16-3z"/>
  </g>

  <text x="72" y="456" fill="#dbeafe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Everything stays project-local under .codex-harness/</text>
  <text x="830" y="456" fill="#d1fae5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">No runtime package downloads. No shell execution inside the MCP.</text>
</svg>
